name: run-tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest]
        php: [8.2, 8.1]
        laravel: [10.*]
        stability: [prefer-lowest, prefer-stable]
        include:
          - laravel: 10.*
            testbench: 8.*
            carbon: ^2.63
          - php: 8.3
            os: ubuntu-latest
            laravel: 13.*
            testbench: 11.*
            carbon: ^3.10
            stability: prefer-lowest
          - php: 8.4
            os: ubuntu-latest
            laravel: 13.*
            testbench: 11.*
            carbon: ^3.10
            stability: prefer-lowest
          - php: 8.3
            os: ubuntu-latest
            laravel: 13.*
            testbench: 11.*
            carbon: ^3.10
            stability: prefer-stable
          - php: 8.4
            os: ubuntu-latest
            laravel: 13.*
            testbench: 11.*
            carbon: ^3.10
            stability: prefer-stable

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.stability }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Prepare Laravel 13 test dependencies
        if: matrix.laravel == '13.*'
        run: |
          composer remove nunomaduro/larastan --dev --no-interaction --no-update
          composer require "nunomaduro/collision:^8.9" "pestphp/pest:^4.4" "pestphp/pest-plugin-arch:^4.0" "pestphp/pest-plugin-laravel:^4.1" --dev --no-interaction --no-update

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" "nesbot/carbon:${{ matrix.carbon }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: List Installed Dependencies
        run: composer show -D

      - name: Execute tests
        if: matrix.laravel != '13.*'
        run: vendor/bin/pest --ci

      - name: Execute Laravel 13 tests
        if: matrix.laravel == '13.*'
        run: vendor/bin/pest --no-coverage
