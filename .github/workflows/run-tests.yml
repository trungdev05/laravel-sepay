            testbench: 7.*
            carbon: ^2.63
            collision: ^6.4
            pest: ^1.23
            pest_laravel: ^1.4
            pest_arch: none
            stability: prefer-lowest
            test_command: vendor/bin/pest tests/ExampleTest.php
